name: todo_app
description: A complete Flutter Todo application with Provider state management
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # State management
  provider: ^6.1.1
  # Local persistence storage
  shared_preferences: ^2.2.2
  # UUID generation for task IDs
  uuid: ^4.3.3
  # Material Design icons
  material_design_icons_flutter: ^7.0.7296

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  # Optional: Add custom fonts or assets here
  # fonts:
  #   - family: CustomFont
  #     fonts:
  #       - asset: assets/fonts/custom_font.ttf
